name: Build and Publish Docker Images

on:
  push:
    branches:
      - main

  workflow_dispatch:

env:
  VERSION: v${{ github.run_number }}

jobs:

  verify:

    name: Verify Project
    runs-on: ubuntu-latest

    steps:

      #################################################
      # Checkout Repository
      #################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

      #################################################
      # Create .env for CI
      #################################################

      - name: Create .env from .env.example
        run: cp .env.example .env

      #################################################
      # Validate Docker Compose
      #################################################

      - name: Validate Docker Compose
        run: docker compose config

      #################################################
      # Validate Python Syntax
      #################################################

      - name: Validate Prompt Service
        run: python -m compileall prompt_service

      - name: Validate Review Service
        run: python -m compileall review_service

      - name: Validate LLM Service
        run: python -m compileall llm_service

      - name: Validate File Service
        run: python -m compileall file_service

      #################################################
      # Build Images (NO PUSH)
      #################################################

      - name: Build Prompt Service
        run: |
          docker build \
            -f prompt_service/Dockerfile \
            -t prompt-test \
            .

      - name: Build Review Service
        run: |
          docker build \
            -f review_service/Dockerfile \
            -t review-test \
            .

      - name: Build LLM Service
        run: |
          docker build \
            -f llm_service/Dockerfile \
            -t llm-test \
            .

      - name: Build File Service
        run: |
          docker build \
            -f file_service/Dockerfile \
            -t file-test \
            .

      - name: Build Frontend
        run: |
          docker build \
            -f frontend/Dockerfile \
            -t frontend-test \
            .

  publish:

    name: Publish Docker Images

    needs: verify

    if: success()

    runs-on: ubuntu-latest

    steps:

      #################################################
      # Checkout
      #################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

      #################################################
      # Login DockerHub
      #################################################

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      #################################################
      # Setup Buildx
      #################################################

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      #################################################
      # Prompt Service
      #################################################

      - name: Push Prompt Service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: prompt_service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/prompt-service:${{ env.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/prompt-service:latest

      #################################################
      # Review Service
      #################################################

      - name: Push Review Service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: review_service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/review-service:${{ env.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/review-service:latest

      #################################################
      # LLM Service
      #################################################

      - name: Push LLM Service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: llm_service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/llm-service:${{ env.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/llm-service:latest

      #################################################
      # File Service
      #################################################

      - name: Push File Service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: file_service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/file-service:${{ env.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/file-service:latest

      #################################################
      # Frontend
      #################################################

      - name: Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/frontend:${{ env.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/frontend:latest