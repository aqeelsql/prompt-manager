server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    location /api/prompts/ {
        proxy_pass http://127.0.0.1:8000/prompts/;
        proxy_read_timeout 130s;
    }

    location /api/chats {
        rewrite ^/api/chats(.*)$ /chats$1 break;
        proxy_pass http://127.0.0.1:8000;
        proxy_read_timeout 130s;
    }

    location /api/reviews/ {
        proxy_pass http://127.0.0.1:8001/reviews/;
        proxy_read_timeout 40s;
    }

    location /api/document-chats {
        rewrite ^/api/document-chats(.*)$ /document-chats$1 break;
        proxy_pass http://127.0.0.1:8000;
        proxy_read_timeout 130s;
    }
    location /api/documents {
        rewrite ^/api/documents(.*)$ /documents$1 break;
        proxy_pass http://127.0.0.1:8003;
        client_max_body_size 15m;
        proxy_read_timeout 40s;
    }
}
