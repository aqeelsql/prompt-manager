server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 15m;

    location / {
        try_files $uri /index.html;
    }

    location /api/prompts/ {
        proxy_pass http://prompt-service:8000/prompts/;
        proxy_read_timeout 130s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/chats {
        rewrite ^/api/chats(.*)$ /chats$1 break;
        proxy_pass http://prompt-service:8000;
        proxy_read_timeout 130s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/reviews/ {
        proxy_pass http://review-service:8001/reviews/;
        proxy_read_timeout 40s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/document-chats {
        rewrite ^/api/document-chats(.*)$ /document-chats$1 break;
        proxy_pass http://prompt-service:8000;
        proxy_read_timeout 130s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/documents {
        rewrite ^/api/documents(.*)$ /documents$1 break;
        proxy_pass http://file-service:8003;
        proxy_read_timeout 40s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
